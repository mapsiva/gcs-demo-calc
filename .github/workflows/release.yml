name: Release
 
# Dispara quando uma tag no formato v*.*.* e enviada
on:
  push:
    tags:
      - 'v*.*.*'
 
permissions:
  contents: write   # necessario para criar releases no GitHub
 
jobs:
  release:
    runs-on: ubuntu-latest
 
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4
 
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Instalar dependencias
        run: pip install -r requirements.txt
 
      - name: Rodar testes (garantia final antes do release)
        run: pytest -v
 
      - name: Empacotar artefato
        run: |
          mkdir -p dist
          cp -r calculadora tests requirements.txt README.md dist/
          tar -czf gcs-ci-demo-python-${{ github.ref_name }}.tar.gz dist/
 
      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          files: gcs-ci-demo-python-*.tar.gz